<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>QR管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:sans-serif;background:#eef3f8;padding:15px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}
button{width:100%;padding:12px;margin-top:10px}
input,select{width:100%;padding:10px;margin-top:5px}
</style>
</head>

<body>

<div class="card">
<h3>基本情報</h3>
<input id="name" placeholder="担当者">
<select id="dept">
<option value="">選択</option>
<option value="深絞り">深絞り</option>
<option value="カットチーム">カットチーム</option>
</select>
<button onclick="start()">開始</button>
</div>

<!-- 深絞り -->
<div id="deep" class="card" style="display:none">
<h3>深絞り</h3>

<select id="deepMousse"></select>
<input id="deepLot" placeholder="Lot">

<input id="box" placeholder="Box QR">
<input id="lid" placeholder="lid QR">

<button onclick="confirmDeep()">確認・保存</button>
</div>

<!-- カット -->
<div id="cut" class="card" style="display:none">
<h3>カットチーム</h3>

<select id="cutMousse"></select>
<input id="cutLot" placeholder="Lot">

<input id="qrInput" placeholder="スキャン">
<button onclick="addQr()">追加</button>

<div id="list"></div>

<button onclick="saveCut()">保存</button>
</div>

<script>

const GAS = "https://script.google.com/macros/s/AKfycby3xjdAFrd5-xTXccvLUjW4-mQPrC2_QHBV2_Icn5oC8YnixD9KTjlETWk2gR9BN813/exec";

let name="", dept="";
let qrList=[];

function start(){
 name=document.getElementById("name").value;
 dept=document.getElementById("dept").value;

 if(!name || !dept){
  alert("入力してください");
  return;
 }

 if(dept==="深絞り") document.getElementById("deep").style.display="block";
 if(dept==="カットチーム") document.getElementById("cut").style.display="block";

 loadMousse();
}

async function loadMousse(){
 const res = await fetch(GAS + "?action=getMousseTypes");
 const json = await res.json();

 const d = document.getElementById("deepMousse");
 const c = document.getElementById("cutMousse");

 json.types.forEach(t=>{
  let o=document.createElement("option");
  o.value=t;o.textContent=t;
  d.appendChild(o);

  let o2=document.createElement("option");
  o2.value=t;o2.textContent=t;
  c.appendChild(o2);
 });
}

/* 深絞り */
async function confirmDeep(){

 const box=document.getElementById("box").value;
 const lid=document.getElementById("lid").value;
 const mousse=document.getElementById("deepMousse").value;
 const lot=document.getElementById("deepLot").value;

 const res = await fetch(GAS,{
  method:"POST",
  body:JSON.stringify({
   action:"confirmAndMaybeSaveDeepDraw",
   operatorName:name,
   department:dept,
   inputMousseType:mousse,
   inputLotNo:lot,
   boxQr:box,
   lidQr:lid
  })
 });

 const json = await res.json();

 if(json.matched){
  alert("一致 → 保存完了");
 }else{
  const newMousse = prompt("ムース修正", mousse);
  const newLot = prompt("Lot修正", lot);

  await fetch(GAS,{
   method:"POST",
   body:JSON.stringify({
    action:"saveDeepDrawFixedLog",
    operatorName:name,
    department:dept,
    fixedMousseType:newMousse,
    fixedLotNo:newLot,
    boxQr:box,
    lidQr:lid
   })
  });

  alert("修正保存完了");
 }
}

/* カット */
function addQr(){
 const v=document.getElementById("qrInput").value.trim();

 if(!v) return;

 if(qrList.includes(v)){
  alert("重複");
  return;
 }

 qrList.push(v);
 render();
 document.getElementById("qrInput").value="";
}

function render(){
 document.getElementById("list").innerHTML=
  qrList.map(q=>"<div>"+q+"</div>").join("");
}

async function saveCut(){

 const mousse=document.getElementById("cutMousse").value;
 const lot=document.getElementById("cutLot").value;

 const res = await fetch(GAS,{
  method:"POST",
  body:JSON.stringify({
   action:"saveCutQrOptimized",
   operatorName:name,
   department:dept,
   mousseType:mousse,
   lotNo:lot,
   qrList:qrList
  })
 });

 const json = await res.json();

 alert(json.message);

 qrList=[];
 render();
}

</script>
</body>
</html>
