<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR管理システム</title>
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body { font-family:sans-serif; background:#eef3f8; padding:15px; }
.card { background:white; padding:15px; border-radius:12px; margin-bottom:15px; }
button { width:100%; padding:12px; margin-top:10px; }
input,select { width:100%; padding:10px; margin-top:5px; }
</style>
</head>

<body>

<div class="card">
<h2>基本情報</h2>
<input id="name" placeholder="担当者">
<select id="dept">
<option value="">選択</option>
<option value="深絞り">深絞り</option>
<option value="カットチーム">カットチーム</option>
</select>
<button onclick="start()">開始</button>
</div>

<!-- 深絞り -->
<div id="deep" style="display:none" class="card">
<h2>深絞り</h2>

<select id="deepMousse"></select>
<input id="deepLot" placeholder="Lot">

<input id="box" placeholder="Box">
<input id="lid" placeholder="lid">

<button onclick="confirmDeep()">確認・保存</button>
</div>

<!-- カット -->
<div id="cut" style="display:none" class="card">
<h2>カットチーム</h2>

<select id="cutMousse"></select>
<input id="cutLot" placeholder="Lot">

<input id="qrInput" placeholder="スキャン">
<button onclick="addQr()">追加</button>

<div id="list"></div>

<button onclick="saveCut()">保存</button>
</div>

<script>

const GAS=""https://script.google.com/macros/s/AKfycbx24-yizeugrVJi7a1EbD3hYJOcvZ1Ksj330F8w06i3jc7ydb-LOfNKUQwuKxF0AaIz/exec";

let name="", dept="";
let qrList=[];

function start(){
 name=document.getElementById("name").value;
 dept=document.getElementById("dept").value;

 if(dept==="深絞り") document.getElementById("deep").style.display="block";
 if(dept==="カットチーム") document.getElementById("cut").style.display="block";

 loadMousse();
}

async function loadMousse(){
 const res=await fetch(GAS+"?action=getMousseTypes&callback=a");
 const text=await res.text();
 const json=JSON.parse(text.replace(/^a\(|\);$/g,''));

 const sel1=document.getElementById("deepMousse");
 const sel2=document.getElementById("cutMousse");

 json.types.forEach(t=>{
  let o=document.createElement("option");
  o.value=t;o.textContent=t;
  sel1.appendChild(o);

  let o2=document.createElement("option");
  o2.value=t;o2.textContent=t;
  sel2.appendChild(o2);
 });
}

/* 深絞り */
async function confirmDeep(){

 const box=document.getElementById("box").value;
 const lid=document.getElementById("lid").value;
 const mousse=document.getElementById("deepMousse").value;
 const lot=document.getElementById("deepLot").value;

 const res=await fetch(GAS+"?action=confirmAndMaybeSaveDeepDraw"+
 "&operatorName="+name+
 "&department="+dept+
 "&inputMousseType="+encodeURIComponent(mousse)+
 "&inputLotNo="+lot+
 "&boxQr="+box+
 "&lidQr="+lid+
 "&callback=b");

 const text=await res.text();
 const json=JSON.parse(text.replace(/^b\(|\);$/g,''));

 if(json.matched){
  alert("一致→保存完了");
 }else{
  const newMousse=prompt("ムース修正",mousse);
  const newLot=prompt("Lot修正",lot);

  await fetch(GAS+"?action=saveDeepDrawFixedLog"+
  "&operatorName="+name+
  "&department="+dept+
  "&fixedMousseType="+encodeURIComponent(newMousse)+
  "&fixedLotNo="+newLot+
  "&boxQr="+box+
  "&lidQr="+lid+
  "&callback=c");

  alert("修正保存完了");
 }
}

/* カット */

function addQr(){
 const v=document.getElementById("qrInput").value.trim();

 if(!v)return;

 if(qrList.includes(v)){
  alert("重複");
  return;
 }

 qrList.push(v);
 render();

 document.getElementById("qrInput").value="";
}

function render(){
 document.getElementById("list").innerHTML=
 qrList.map(q=>"<div>"+q+"</div>").join("");
}

async function saveCut(){

 const mousse=document.getElementById("cutMousse").value;
 const lot=document.getElementById("cutLot").value;

 const res=await fetch(GAS+"?action=saveCutQrOptimized"+
 "&operatorName="+name+
 "&department="+dept+
 "&mousseType="+encodeURIComponent(mousse)+
 "&lotNo="+lot+
 "&qrList="+encodeURIComponent(JSON.stringify(qrList))+
 "&callback=d");

 const text=await res.text();
 const json=JSON.parse(text.replace(/^d\(|\);$/g,''));

 alert(json.message);

 qrList=[];
 render();
}

</script>
</body>
</html>
